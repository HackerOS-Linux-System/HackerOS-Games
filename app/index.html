<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HackerOS Games Launcher</title>
    <!-- Google Fonts: Share Tech Mono for that terminal feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#050505',
              surface: '#111111',
              neonGreen: '#00ff41',
              neonRed: '#ff0033',
              neonBlue: '#00d0ff',
              neonPink: '#d600ff',
              neonYellow: '#fcee0a',
            },
            fontFamily: {
              mono: ['"Share Tech Mono"', 'monospace'],
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px)",
            }
          }
        }
      }
    </script>
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border: 1px solid #00ff41;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff41;
        }

        /* CRT Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
        .glow-text {
            text-shadow: 0 0 10px currentColor;
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "electron": "https://esm.sh/electron@^40.1.0",
    "path": "https://esm.sh/path@^0.12.7",
    "child_process": "https://esm.sh/child_process@^1.0.2",
    "fs": "https://esm.sh/fs@^0.0.1-security"
  }
}
</script>
</head>
  <body class="bg-background text-white overflow-hidden selection:bg-neonGreen selection:text-black">
    <div class="scanlines"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
